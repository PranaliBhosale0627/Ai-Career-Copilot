services:
  - type: web
    name: careerco-pilot-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: careerco_pilot
      - key: MONGODB_COLLECTION_NAME
        value: app_state
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
